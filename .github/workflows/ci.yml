# CI (issue #21):
#   test  -- pytest + ruff。全push/PRで実行。テストはpromptfoo/GEPAを全てモック
#            しているためAPIキー不要。run.pyがWindowsのnpx.cmd解決を明示的に
#            扱っているので、Ubuntu/Windows両方のマトリクスで検証する。
#   smoke -- masterへのpush時のみ、ランナー上のOllama（qwen2.5:0.5b）で
#            build -> run --limit 3 -> report の実疎通を確認。ローカルモデル
#            なのでAPIキー・secrets不要、コスト0。
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: pytest + ruff (${{ matrix.os }}, py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint (ruff check)
        # TODO: `uv run ruff format --check .` もここに追加する。ただし現状は
        # 13ファイルがリポジトリ全体の再フォーマット対象になり、並行開発中の
        # ブランチと衝突するため、それらのマージ後に別PRで導入する。
        run: uv run ruff check .
      - name: Run tests
        # test_label_normalization.pyのJS側テストはランナー同梱のNodeで実行される
        # （node不在の環境ではskipifで自動スキップ）
        run: uv run pytest

  smoke:
    # パイプライン疎通確認（精度測定ではない）。config.ci-smoke.yaml は
    # ランナーのCPUで動く qwen2.5:0.5b 単独 + --limit 3（先頭3ケースは各2,500字
    # 未満）なので、モデルのpull（約400MB）込みでも数分で終わる想定。
    #
    # 成否は「output.json / meta.json が生成され report が作れること」で判定する。
    # promptfoo の exit code 100 は「assert失敗あり」であって異常終了ではない
    # （evalloop run は output.json が生成されなかった場合のみ exit 1 になる）。
    # 0.5bモデルのジャッジ品質は当然低いが、判定基準が上記なので問題にならない。
    name: live smoke eval (ollama qwen2.5:0.5b, 3 cases)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          # promptfooの要求範囲は ^20.20.0 || >=22.22.0（run.py / README参照）
          node-version: "22"
      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          # インストーラがsystemdサービスとして起動済みでなければ手動起動する
          if ! curl -sf http://localhost:11434/api/tags > /dev/null; then
            nohup ollama serve > /tmp/ollama.log 2>&1 &
          fi
          timeout 90 bash -c 'until curl -sf http://localhost:11434/api/tags > /dev/null; do sleep 2; done'
      - name: Pull smoke model
        run: ollama pull qwen2.5:0.5b
      - name: Install dependencies
        run: uv sync
      - name: Build (ollama smoke config)
        # config.ci-smoke.yaml は評価対象とllm-rubricジャッジが同一モデルのため、
        # iron rule #2 の明示オーバーライドが必要（スモークは精度を測らない）
        run: uv run evalloop build --yes --allow-same-judge --config config.ci-smoke.yaml
      - name: Run 3-case eval
        run: uv run evalloop run --limit 3 --repeat 1 --config config.ci-smoke.yaml
      - name: Generate report for the smoke run
        run: |
          RUN_ID=$(uv run python -c "import json; print(json.loads(open('results/index.jsonl', encoding='utf-8').readlines()[-1])['run_id'])")
          uv run evalloop report "$RUN_ID"
          test -f "results/reports/${RUN_ID}.md"
