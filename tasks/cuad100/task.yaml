# =============================================================================
# CUAD-100 契約条項抽出タスク
#
# データ（golden.jsonl / human_labels.jsonl 等）は git 管理外（issue #47 の
# データポリシー）。取得・再生成の手順は PROVENANCE.md を参照。
# プロンプトは prompts/task.txt・prompts/judge_rubric.txt に規約固定。
# =============================================================================

task:
  # CUAD (Contract Understanding Atticus Dataset) v1 の100件サブセットを使った
  # 契約条項抽出タスク。抽出式QA（該当箇所のテキストを抜き出す）なので
  # answer_type=text で llm-rubric ジャッジを使う
  answer_type: text
  labels: []
  json_schema_file: null

# グローバル registry（config.yaml）からの alias 選択
models: [glm52]

judge:
  # llm-rubric の grader。必ず明示する（環境キー依存の暗黙デフォルトグレーダーは禁止）
  # 被評価モデルと同一providerの場合、build は既定で停止する（--allow-same-judge でのみ回避）
  #
  # 注意: 現在のチェックイン設定は models: [glm52] で、judgeにも同じGLM-5.2
  # providerを使う。そのため build には `--allow-same-judge` が必要で、glm52の
  # 結果全体が自己採点になる。独立したjudgeへ変更すればフラグは不要になる。
  provider: ollama:chat:glm-5.2:cloud
  threshold: 0.8
  agreement_threshold: 0.85     # human_labels.jsonl とのジャッジ一致率のしきい値

optimize:
  target_alias: glm52                                # GEPAで最適化する対象モデル
  reflection_provider: ollama_chat/glm-5.2:cloud      # dspy側の表記（GLM-5.2 cloud、無料）
  auto: light

blog:
  jpy_per_usd: 150               # コストの円換算表示用（0で非表示）
  slug_prefix: llm-eval
  allowed_sources:                # 公開ガードが許可するmeta.sourceの値
    - "self-made"
    - "CUAD v1 (The Atticus Project, CC BY 4.0) via chenghao/cuad_qa mirror on Hugging Face"
