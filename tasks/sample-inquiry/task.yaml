# =============================================================================
# サンプルタスク: 問い合わせ4分類（合成データ）
#
# fresh clone で即動く唯一のタスク。golden.jsonl / human_labels.jsonl は
# 自作の合成データ（meta.source: self-made）のため、データポリシー
# （issue #47: タスクデータは既定でgitignore）の例外としてgit追跡に
# オプトインしている（.gitignore の否定パターン参照）。
# クイックスタートと CI スモークのデータ源。
# =============================================================================

task:
  answer_type: label
  labels: ["契約照会", "障害報告", "機能要望", "その他"]
  json_schema_file: null

# 省略 = グローバル registry の全モデル（CIスモークは --models gptoss20b で絞る）

judge:
  # answer_type=label は決定的assert（label_match.js）で採点するためジャッジは
  # 実際には呼ばれないが、スキーマ上必須のため明示しておく
  provider: anthropic:messages:claude-sonnet-4-6
  threshold: 0.8
  agreement_threshold: 0.85

optimize:
  target_alias: qwen7b
  reflection_provider: anthropic/claude-opus-4-8
  auto: light
  # 最適化手法の選択（省略時 gepa）。3手法から選べる:
  #   gepa     : 進化的プロンプト最適化（デフォルト）。auto で反復強度を light/medium/heavy から選ぶ
  #   miprov2  : ベイズ最適化（instructionのみ、demosは未対応）。params.val_ratio / params.seed を調整
  #   copro    : coordinate ascent 的反復。params.breadth / params.depth / params.init_temperature を調整
  # どの手法も学習は決定的な代理メトリクスで行い、最終評価はllm-rubric/label_matchのまま（既知の制約）
  # 手法選定の判断は docs/APO_GUIDE.md（症状→粒度→手法の診断ガイド）を参照
  # method: gepa
  # params: {}                   # 手法固有パラメータの受け皿。GEPAでは params.auto が上の auto より優先される
  # 例: MIPROv2 の場合
  # method: miprov2
  # params: {val_ratio: 0.2, seed: 0}
  # 例: COPRO の場合
  # method: copro
  # params: {breadth: 10, depth: 3, init_temperature: 1.4}

blog:
  jpy_per_usd: 150
  slug_prefix: llm-eval
  allowed_sources:
    - "self-made"
