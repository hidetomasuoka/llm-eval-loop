# =============================================================================
# サンプルタスク: 問い合わせ4分類（合成データ）
#
# fresh clone で即動く唯一のタスク。golden.jsonl / human_labels.jsonl は
# 自作の合成データ（meta.source: self-made）のため、データポリシー
# （issue #47: タスクデータは既定でgitignore）の例外としてgit追跡に
# オプトインしている（.gitignore の否定パターン参照）。
# クイックスタートと CI スモークのデータ源。
# =============================================================================

task:
  answer_type: label
  labels: ["契約照会", "障害報告", "機能要望", "その他"]
  json_schema_file: null

# 省略 = グローバル registry の全モデル（CIスモークは --models gptoss20b で絞る）

judge:
  # answer_type=label は決定的assert（label_match.js）で採点するためジャッジは
  # 実際には呼ばれないが、スキーマ上必須のため明示しておく
  provider: anthropic:messages:claude-sonnet-4-6
  threshold: 0.8
  agreement_threshold: 0.85

optimize:
  target_alias: qwen7b
  reflection_provider: anthropic/claude-opus-4-8
  auto: light
  # 最適化手法は method で選択（省略時 gepa）。手法固有パラメータは params。
  # どの手法でも訓練メトリクスは代理指標（プロキシ）で、最終評価は llm-rubric のまま。
  # 手法の選び方は docs/APO_GUIDE.md（症状→粒度→手法）を参照。設定例:
  #
  # method: gepa                 # 進化的なinstruction最適化（reflection LMが改善案を提案）
  # params: {auto: medium}       # params.auto は上の auto より優先される
  #
  # method: miprov2              # ベイズ最適化。※現状instructionのみ（demosはAPO-17で解放予定）
  # params: {auto: light, val_ratio: 0.2, seed: 0}   # train splitから8:2でvalsetを分割（seed固定）
  #
  # method: copro                # coordinate ascent型のinstruction改善
  # params: {breadth: 10, depth: 3, init_temperature: 1.4}

blog:
  jpy_per_usd: 150
  slug_prefix: llm-eval
  allowed_sources:
    - "self-made"
