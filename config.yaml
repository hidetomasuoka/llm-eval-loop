# =============================================================================
# llm-eval-loop グローバル設定（issue #47: 複数タスクワークスペース構成）
#
# ここには「全タスク共通のもの」だけを置く:
#   - models[]:     評価対象モデルの registry（モデル動物園）。単価・sampling可否を
#                   1箇所で管理し、各タスクは tasks/<name>/task.yaml の models: で
#                   alias を選択する（省略時は全モデル）
#   - run:          実行デフォルト（タスク側で上書き可）
#   - default_task: --task 省略時・EVALLOOP_TASK 未設定時に使うタスク
#
# タスク固有の設定（answer_type / labels / judge / optimize / blog）は
# tasks/<name>/task.yaml にある。新しいタスクの追加は tasks/ にディレクトリを
# 切るだけで、既存タスクのファイルには一切触れない。
#
# 注意: `promptfoo share` はクラウドアップロードのため本プロジェクトでは使用禁止。
#       ローカル結果の閲覧には `evalloop view` を使うこと。
# =============================================================================

# fresh clone でもデータが存在する唯一のタスク（合成デモデータ、git追跡オプトイン）。
# 実タスクで作業するときは --task か EVALLOOP_TASK で切り替える
default_task: sample-inquiry

# 評価対象モデル registry。★provider IDは例。promptfoo公式Docsで実装時に確認すること
# 単価は2026-07時点のAnthropic公式価格（$/MTok）。実行前に公式料金ページで最新を確認すること
models:
  - provider: ollama:chat:qwen2.5:7b
    alias: qwen7b
    tier: local
    price_in_per_mtok: 0.0      # ローカル実行なのでコストは0
    price_out_per_mtok: 0.0
  - provider: ollama:chat:qwen3:4b
    alias: qwen4b
    tier: local
    price_in_per_mtok: 0.0      # ローカル実行なのでコストは0
    price_out_per_mtok: 0.0
  - provider: anthropic:messages:claude-haiku-4-5-20251001
    alias: haiku45
    tier: small
    price_in_per_mtok: 1.0
    price_out_per_mtok: 5.0
  - provider: anthropic:messages:claude-sonnet-4-6
    alias: sonnet46
    tier: mid
    price_in_per_mtok: 3.0
    price_out_per_mtok: 15.0
  - provider: anthropic:messages:claude-sonnet-5
    alias: sonnet5
    tier: mid
    price_in_per_mtok: 2.0      # 2026-07時点の導入価格（$2/$10、2026-08-31まで。以降 $3/$15 に戻る）
    price_out_per_mtok: 10.0
  - provider: anthropic:messages:claude-opus-4-8
    alias: opus48
    tier: large
    price_in_per_mtok: 5.0
    price_out_per_mtok: 25.0
    # claude-opus-4-8はsamplingパラメータ(temperature/top_p/top_k)をHTTP 400で
    # 拒否するため、build時にtemperatureを出力しない
    supports_sampling_params: false
  - provider: anthropic:messages:claude-fable-5
    alias: fable5
    tier: frontier
    price_in_per_mtok: 10.0
    price_out_per_mtok: 50.0
    # claude-fable-5も同様にsamplingパラメータをHTTP 400で拒否する
    supports_sampling_params: false
  - provider: ollama:chat:gpt-oss:20b
    alias: gptoss20b
    tier: small
    # Ollama Cloud（https://ollama.com）経由で使う。CIスモーク用
    # （`--models gptoss20b` で選択。OLLAMA_BASE_URL/OLLAMA_API_KEY が必要）
    price_in_per_mtok: 0.0      # サブスク/無料枠ベースで従量単価なし
    price_out_per_mtok: 0.0
  - provider: ollama:chat:glm-5.2:cloud
    alias: glm52
    tier: frontier
    # Ollama経由でGLM-5.2（cloud版）を使う。ローカルOllamaデーモンが
    # glm-5.2:cloud をpull済みであること（ollama pull glm-5.2:cloud）
    price_in_per_mtok: 0.0
    price_out_per_mtok: 0.0

run:
  repeat: 1                     # 安定測定フェーズでは3にする（promptfoo --repeat）
  temperature: 0.0
  max_tokens: 8192
  cost_warn_usd: 3.0            # 実行前概算(USD)がこれを超えたら確認プロンプトを出す
