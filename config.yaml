# =============================================================================
# llm-eval-loop マスター設定
#
# このファイルは `evalloop build` の唯一の入力設定です。
# 本タスク差し替え時に触るのは config.yaml / data/golden.jsonl / prompts/base/*.txt
# の3点だけで済む構造になっています（README.md セクション14）。
#
# 注意: models[].provider の表記・price_*_per_mtok の単価はあくまでサンプル値です。
#       promptfoo の provider ID 命名規則や各社の価格は変わるため、
#       `evalloop doctor` が通らない ID は使わず、単価は使用時点の公式価格に
#       更新してください（README.md セクション13の注意書き参照）。
#
# 注意: `promptfoo share` はクラウドアップロードのため本プロジェクトでは使用禁止です。
#       ローカル結果の閲覧には `evalloop view`（= `promptfoo view`）を使ってください。
# =============================================================================

task:
  # タスク名。run_id や blog の slug のプレフィックスには使わない（それは blog.slug_prefix）
  # CUAD (Contract Understanding Atticus Dataset) v1 の100件サブセットを使った
  # 契約条項抽出タスク。元のサンプルタスク(問い合わせ分類)は data/sample/ に残っている。
  name: cuad100-clause-extraction
  # label: 決定的なラベル一致assert（javascript） / json: is-json + フィールド比較 / text: llm-rubric
  # CUADは抽出式QA（該当箇所のテキストを抜き出す）なので answer_type=text で
  # llm-rubricジャッジを使う
  answer_type: text
  # {{input}} プレースホルダを含むベースプロンプト。file:// でpromptfooに渡される
  prompt_file: prompts/base/task.txt
  # answer_type=label のときの許容ラベル一覧（正規化・部分一致判定にも使う）。text/jsonでは未使用
  labels: []
  # answer_type=json のときのみ必須。JSON Schemaファイルへのパス
  json_schema_file: null

# 評価対象モデル一覧。★provider IDは例。promptfoo公式Docsで実装時に確認すること
# 単価は2026-07時点のAnthropic公式価格（$/MTok）。実行前に公式料金ページで最新を確認すること
models:
  - provider: ollama:chat:qwen2.5:7b
    alias: qwen7b
    tier: local
    price_in_per_mtok: 0.0      # ローカル実行なのでコストは0
    price_out_per_mtok: 0.0
  - provider: anthropic:messages:claude-haiku-4-5-20251001
    alias: haiku45
    tier: small
    price_in_per_mtok: 1.0
    price_out_per_mtok: 5.0
  - provider: anthropic:messages:claude-sonnet-4-6
    alias: sonnet46
    tier: mid
    price_in_per_mtok: 3.0
    price_out_per_mtok: 15.0
  - provider: anthropic:messages:claude-opus-4-8
    alias: opus48
    tier: large
    price_in_per_mtok: 5.0
    price_out_per_mtok: 25.0
    # claude-opus-4-8はsamplingパラメータ(temperature/top_p/top_k)をHTTP 400で
    # 拒否するため、build時にtemperatureを出力しない
    supports_sampling_params: false
  - provider: anthropic:messages:claude-fable-5
    alias: fable5
    tier: frontier
    price_in_per_mtok: 10.0
    price_out_per_mtok: 50.0
    # claude-fable-5も同様にsamplingパラメータをHTTP 400で拒否する
    supports_sampling_params: false

run:
  repeat: 1                     # 安定測定フェーズでは3にする（promptfoo --repeat）
  temperature: 0.0
  max_tokens: 1024
  cost_warn_usd: 3.0            # 実行前概算(USD)がこれを超えたら確認プロンプトを出す

judge:
  # llm-rubric の grader。必ず明示する（環境キー依存の暗黙デフォルトグレーダーは禁止）
  # 被評価モデルと同一providerの場合、build は既定で停止する（--allow-same-judge でのみ回避）
  #
  # 注意: このconfigはmodels[]に5段階の全ティアを含めており、judgeにはそのうち
  # sonnet46と同一providerを使っている。そのためanswer_type=textでbuildする際は
  # `evalloop build --allow-same-judge` が必要（sonnet46の行だけ自己採点になる
  # 既知のトレードオフとして許容している。他の4モデルは独立採点される）。
  # 自己採点バイアスを避けたい場合は、評価対象に含まれない別モデルをjudgeに指定すること。
  provider: anthropic:messages:claude-sonnet-4-6
  threshold: 0.8
  agreement_threshold: 0.85     # human_labels.jsonl とのジャッジ一致率のしきい値
  rubric_file: prompts/base/judge_rubric.txt

optimize:
  target_alias: qwen7b                              # GEPAで最適化する対象モデル
  reflection_provider: anthropic/claude-opus-4-8     # dspy側の表記（大型モデル）
  auto: light

blog:
  jpy_per_usd: 150               # コストの円換算表示用（0で非表示）
  slug_prefix: llm-eval
  allowed_sources:                # 公開ガード(README.md 9.3.1)が許可するmeta.sourceの値
    - "self-made"
    - "CUAD v1 (The Atticus Project, CC BY 4.0) via chenghao/cuad_qa mirror on Hugging Face"
